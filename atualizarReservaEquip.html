<!DOCTYPE html>
<html lang="PT-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <form>
    <label>ID Reserva:</label>
    <input type="number" name="id_reserva_equip" required><br>

    <label>ID Equipamento:</label>
    <input type="number" name="id_equip" required><br>

    <label>ID Usuário:</label>
    <input type="number" name="id_usuario" required><br>

    <label>Data Início:</label>
    <input type="date" name="inicio_data" required><br>

    <label>Data Fim:</label>
    <input type="date" name="fim_data" required><br>

    <label>Horário Início:</label>
    <input type="time" name="horario_inicio" required><br>

    <label>Horário Final:</label>
    <input type="time" name="horario_final" required><br>

    <button type="submit">Atualizar</button>
</form>
    </body>
</html>
